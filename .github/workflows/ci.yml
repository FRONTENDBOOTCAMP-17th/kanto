name: CI
on:
  pull_request:
    branches: [develop, main]
jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TERMS_PAGE_ID: ${{ secrets.NOTION_TERMS_PAGE_ID }}
          NOTION_TERMS_SERVICE_PAGE_ID: ${{ secrets.NOTION_TERMS_SERVICE_PAGE_ID }}
          NOTION_TERMS_PRIVACY_PAGE_ID: ${{ secrets.NOTION_TERMS_PRIVACY_PAGE_ID }}
          NOTION_TERMS_POLICY_PAGE_ID: ${{ secrets.NOTION_TERMS_POLICY_PAGE_ID }}
          NOTION_TERMS_YOUTH_PAGE_ID: ${{ secrets.NOTION_TERMS_YOUTH_PAGE_ID }}
          NOTION_TERMS_PAYMENT_PAGE_ID: ${{ secrets.NOTION_TERMS_PAYMENT_PAGE_ID }}
          NOTION_TERMS_AGE_PAGE_ID: ${{ secrets.NOTION_TERMS_AGE_PAGE_ID }}
          XENDIT_SECRET_KEY: ${{ secrets.XENDIT_SECRET_KEY }}
          XENDIT_CALLBACK_TOKEN: ${{ secrets.XENDIT_CALLBACK_TOKEN }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
